<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉字描红练习</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d5b7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========== 顶部输入区 ========== */
        .top-bar {
            background: rgba(255, 250, 244, 0.97);
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(120, 80, 40, 0.12);
            padding: 24px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .input-wrapper {
            max-width: 820px;
            margin: 0 auto;
            text-align: center;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            color: #5c3d2e;
            margin-bottom: 6px;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 13px;
            color: #8c7a6b;
            margin-bottom: 16px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: stretch;
            flex-wrap: wrap;
        }

        #char-input {
            flex: 1 1 360px;
            min-width: 220px;
            max-width: 600px;
            padding: 14px 20px;
            font-size: 20px;
            border: 2px solid #c9a97a;
            border-radius: 10px;
            outline: none;
            background: #fffdf9;
            color: #3d2914;
            letter-spacing: 6px;
            transition: border-color .2s, box-shadow .2s;
        }
        #char-input:focus {
            border-color: #a67042;
            box-shadow: 0 0 0 3px rgba(166, 112, 66, 0.18);
        }

        .btn {
            padding: 14px 26px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform .12s, box-shadow .2s, background .2s;
            white-space: nowrap;
        }

        .rows-select {
            padding: 14px 12px;
            font-size: 15px;
            font-weight: 600;
            border: 2px solid #c9a97a;
            border-radius: 10px;
            background: #fffdf9;
            color: #3d2914;
            cursor: pointer;
            outline: none;
            min-width: 80px;
            text-align: center;
        }
        .rows-select:focus {
            border-color: #a67042;
            box-shadow: 0 0 0 3px rgba(166, 112, 66, 0.18);
        }
        .rows-label {
            font-size: 14px;
            color: #7a6450;
            align-self: center;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.97); }

        .btn-generate {
            background: linear-gradient(135deg, #b85c2e, #d4753f);
            color: #fff;
            box-shadow: 0 3px 10px rgba(184, 92, 46, 0.35);
        }
        .btn-generate:hover { background: linear-gradient(135deg, #a14e23, #c0662f); }

        .btn-download {
            background: #5c3d2e;
            color: #f5e6d3;
            box-shadow: 0 3px 10px rgba(92, 61, 46, 0.3);
        }
        .btn-download:hover { background: #7a5540; }

        .preview-info {
            margin-top: 10px;
            font-size: 12px;
            color: #9b8575;
        }

        /* ========== PDF 区 ========== */
        .pdf-area {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 28px 16px 40px;
        }

        .pdf-container {
            width: 100%;
            max-width: 900px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.13);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .pdf-toolbar {
            padding: 10px 18px;
            background: #faf5ee;
            border-bottom: 1px solid #e8d5b7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #7a6450;
        }

        #pdf-viewer {
            width: 100%;
            height: calc(100vh - 220px);
            min-height: 420px;
            border: none;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8c7a6b;
            font-size: 14px;
        }

        /* 响应式 */
        @media (max-width: 540px) {
            #char-input { font-size: 17px; letter-spacing: 3px; }
            .title { font-size: 18px; }
            .pdf-toolbar { font-size: 11px; }
        }
    </style>
</head>
<body>

    <!-- 顶部输入区 -->
    <div class="top-bar">
        <div class="input-wrapper">
            <div class="title">汉字描红练习本</div>
            <div class="subtitle">输入汉字，自动生成带田字格的描红练习 PDF</div>
            <div class="input-row">
                <input
                    type="text"
                    id="char-input"
                    placeholder="在此输入练习的汉字，例如：天地玄黄"
                    maxlength="200"
                    value="{{ default_text }}"
                    autocomplete="off"
                    autofocus
                >
                <span class="rows-label">行数</span>
                <select class="rows-select" id="rows-select" title="每个字的行数">
                    <option value="1">1行</option>
                    <option value="2">2行</option>
                    <option value="3" selected>3行</option>
                    <option value="4">4行</option>
                    <option value="5">5行</option>
                    <option value="6">6行</option>
                    <option value="7">7行</option>
                    <option value="8">8行</option>
                    <option value="9">9行</option>
                    <option value="10">10行</option>
                    <option value="11">11行</option>
                    <option value="12">12行</option>
                </select>
                <button class="btn btn-generate" id="btn-generate">生成描红</button>
                <button class="btn btn-download" id="btn-download">下载 PDF</button>
            </div>
            <div class="preview-info">
                共 <span id="char-count">0</span> 字 · 当前字体: <span id="font-name">{{ font_name }}</span>
            </div>
        </div>
    </div>

    <!-- PDF 预览区 -->
    <div class="pdf-area">
        <div class="pdf-container">
            <div class="pdf-toolbar">
                <span>PDF 预览</span>
                <span id="pdf-status">点击「生成描红」开始</span>
            </div>
            <iframe id="pdf-viewer" name="pdf-viewer"></iframe>
        </div>
    </div>

    <script>
        const input      = document.getElementById('char-input');
        const viewer     = document.getElementById('pdf-viewer');
        const btnGen     = document.getElementById('btn-generate');
        const btnDl      = document.getElementById('btn-download');
        const charCount  = document.getElementById('char-count');
        const pdfStatus  = document.getElementById('pdf-status');
        const rowsSelect = document.getElementById('rows-select');

        function countChars(text) {
            return [...text.replace(/\s/g, '')].length;
        }

        function refreshCount() {
            charCount.textContent = countChars(input.value);
        }

        function generate() {
            const text = input.value.trim();
            if (!text) {
                pdfStatus.textContent = '⚠️ 请先输入汉字';
                return;
            }
            const rows = rowsSelect.value;
            const url = '/pdf?text=' + encodeURIComponent(text) + '&rows=' + rows;
            pdfStatus.textContent = '正在生成 …';
            viewer.src = url;
            viewer.onload = () => { pdfStatus.textContent = '✅ 生成完毕'; };
        }

        // 事件
        btnGen.addEventListener('click', generate);

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') generate();
        });

        input.addEventListener('input', refreshCount);
        // 改变行数时自动重新生成（如果有内容）
        rowsSelect.addEventListener('change', () => {
            if (input.value.trim()) generate();
        });

        btnDl.addEventListener('click', () => {
            const text = input.value.trim();
            if (!text) { alert('请先输入汉字'); return; }
            const rows = rowsSelect.value;
            window.location.href = '/pdf/download?text=' + encodeURIComponent(text) + '&rows=' + rows;
        });

        // 初始化
        refreshCount();
        // 可选：页面加载时自动生成一次默认字表
        window.addEventListener('load', () => {
            setTimeout(generate, 300);
        });
    </script>
</body>
</html>
